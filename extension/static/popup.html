<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Construct</h1>

    <div id="idle-view">
      <p class="hint">Record your browser actions to create a test.</p>
      <button id="record-btn" class="btn btn-record">Record</button>
    </div>

    <div id="recording-view" style="display:none">
      <div class="status">
        <span class="red-dot"></span>
        <span>Recording&hellip;</span>
      </div>
      <p class="count"><span id="event-count">0</span> actions captured</p>
      <button id="stop-btn" class="btn btn-stop">Stop</button>
    </div>

    <div id="error-view" style="display:none">
      <p class="error-text" id="error-msg"></p>
      <p class="hint">Events saved locally as fallback.</p>
      <button id="dismiss-btn" class="btn btn-record">OK</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
