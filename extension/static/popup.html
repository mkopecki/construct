<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M2 2h4v4H2V2Zm6 0h4v4H8V2ZM2 8h4v4H2V8Zm6 2h4v2H8v-2Z" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">Construct</span>
      </div>
      <span class="version">v0.1</span>
    </div>

    <div id="idle-view">
      <div class="idle-content">
        <div class="idle-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <p class="hint">Record browser actions to create an automation workflow.</p>
      </div>
      <button id="record-btn" class="btn btn-record">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="8"/>
        </svg>
        Record
      </button>
    </div>

    <div id="recording-view" style="display:none">
      <div class="recording-card">
        <div class="status">
          <span class="rec-indicator">
            <span class="red-dot"></span>
          </span>
          <span class="status-text">Recording</span>
        </div>
        <div class="event-counter">
          <span id="event-count" class="count-number">0</span>
          <span class="count-label">actions captured</span>
        </div>
      </div>
      <button id="stop-btn" class="btn btn-stop">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        Stop Recording
      </button>
    </div>

    <div id="error-view" style="display:none">
      <div class="error-card">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <p class="error-text" id="error-msg"></p>
      </div>
      <p class="hint fallback-hint">Events saved locally as fallback.</p>
      <button id="dismiss-btn" class="btn btn-dismiss">OK</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
